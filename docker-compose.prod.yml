# =============================================================================
# PRODUCTION DOCKER COMPOSE CONFIGURATION
# =============================================================================
# This configuration provides:
# - Restart policies: always
# - Health checks for both services
# - Resource limits (CPU, memory)
# - Volume mounts for persistence
# - Network configuration
# - Environment variables from .env.production
# - No dev mode flags (--reload removed)
# - Production-ready configuration
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # BACKEND SERVICE
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - PYTHON_VERSION=3.11
    container_name: media-converter-backend
    image: media-converter-backend:latest
    
    # Restart policy - always restart on failure
    restart: always
    
    # Environment variables from .env.production
    env_file:
      - .env.production
    
    # Environment overrides
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - BACKEND_RELOAD=false
    
    # Port mapping (only expose to localhost)
    ports:
      - "127.0.0.1:8000:8000"
    
    # Volume mounts for persistence
    volumes:
      # Temporary upload directory
      - ./backend/uploads:/app/uploads
      # Converted files directory
      - ./backend/converted:/app/converted
      # Logs directory
      - ./logs/backend:/var/log/media-converter
    
    # Networks
    networks:
      - media-converter-network
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Dependencies
    depends_on:
      - frontend

  # ---------------------------------------------------------------------------
  # FRONTEND SERVICE
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NODE_VERSION=18
    container_name: media-converter-frontend
    image: media-converter-frontend:latest
    
    # Restart policy - always restart on failure
    restart: always
    
    # Environment variables from .env.production
    env_file:
      - .env.production
    
    # Port mapping (only expose to localhost)
    ports:
      - "127.0.0.1:5173:5173"
    
    # Volume mounts
    volumes:
      # Logs directory
      - ./logs/frontend:/var/log/frontend
    
    # Networks
    networks:
      - media-converter-network
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# -----------------------------------------------------------------------------
# NETWORKS
# -----------------------------------------------------------------------------
networks:
  media-converter-network:
    driver: bridge
    name: media-converter-network

# -----------------------------------------------------------------------------
# VOLUMES (optional - if you want named volumes instead of bind mounts)
# -----------------------------------------------------------------------------
# Uncomment if you prefer Docker-managed volumes:
# volumes:
#   uploads:
#     driver: local
#   converted:
#     driver: local
#   backend-logs:
#     driver: local
#   frontend-logs:
#     driver: local

# =============================================================================
# USAGE INSTRUCTIONS
# =============================================================================
#
# 1. Ensure .env.production exists with production values:
#    cp .env.production.example .env.production
#    nano .env.production  # Edit with your values
#
# 2. Create required directories:
#    mkdir -p backend/uploads backend/converted logs/backend logs/frontend
#
# 3. Build and start services:
#    docker-compose -f docker-compose.prod.yml up -d --build
#
# 4. Check service status:
#    docker-compose -f docker-compose.prod.yml ps
#
# 5. View logs:
#    docker-compose -f docker-compose.prod.yml logs -f
#    docker-compose -f docker-compose.prod.yml logs -f backend
#    docker-compose -f docker-compose.prod.yml logs -f frontend
#
# 6. Check health status:
#    docker ps --format "table {{.Names}}\t{{.Status}}"
#
# 7. Stop services:
#    docker-compose -f docker-compose.prod.yml down
#
# 8. Restart services:
#    docker-compose -f docker-compose.prod.yml restart
#
# 9. Update and rebuild:
#    git pull
#    docker-compose -f docker-compose.prod.yml up -d --build
#
# 10. Clean up (WARNING: removes volumes):
#     docker-compose -f docker-compose.prod.yml down -v
#
# =============================================================================
# MONITORING
# =============================================================================
#
# Check container stats:
#   docker stats
#
# Check container health:
#   docker inspect --format='{{json .State.Health}}' media-converter-backend
#   docker inspect --format='{{json .State.Health}}' media-converter-frontend
#
# Check logs size:
#   du -sh logs/
#
# Follow logs in real-time:
#   docker-compose -f docker-compose.prod.yml logs -f --tail=100
#
# =============================================================================
# MAINTENANCE
# =============================================================================
#
# Clean up old images:
#   docker image prune -a --filter "until=24h"
#
# Clean up system:
#   docker system prune -a --volumes
#
# Backup volumes:
#   tar -czf backup-uploads-$(date +%Y%m%d).tar.gz backend/uploads
#   tar -czf backup-converted-$(date +%Y%m%d).tar.gz backend/converted
#
# Restore volumes:
#   tar -xzf backup-uploads-YYYYMMDD.tar.gz
#
# =============================================================================
# TROUBLESHOOTING
# =============================================================================
#
# Container won't start:
#   - Check logs: docker-compose -f docker-compose.prod.yml logs backend
#   - Check health: docker inspect media-converter-backend
#   - Check port conflicts: sudo netstat -tulpn | grep :8000
#
# Health check failing:
#   - Enter container: docker exec -it media-converter-backend bash
#   - Test health endpoint: curl -f http://localhost:8000/health
#   - Check application logs
#
# Out of memory:
#   - Check stats: docker stats
#   - Increase memory limits in deploy.resources.limits
#   - Check system memory: free -h
#
# Disk space issues:
#   - Check disk usage: df -h
#   - Check Docker disk usage: docker system df
#   - Clean up: docker system prune -a
#   - Clean up uploads: find backend/uploads -mtime +1 -delete
#
# =============================================================================
